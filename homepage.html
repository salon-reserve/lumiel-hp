<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Lumiel | HP制作</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">Lumiel</a>

    <nav class="desktop-nav">
      <a href="index.html">HOME</a>
      <a href="plan.html">料金プラン</a>
      <a href="reservation.html">予約フォーム</a>
      <a href="homepage.html">HP制作</a>
      <a href="line.html">公式LINE</a>
    </nav>

    <button class="menu-toggle" id="menuToggle" type="button" aria-label="メニューを開く">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <a href="index.html#contact" class="header-btn">無料相談はこちら</a>
  </div>

  <nav class="mobile-nav" id="mobileNav">
    <a href="index.html">HOME</a>
    <a href="plan.html">料金プラン</a>
    <a href="reservation.html">予約フォーム</a>
    <a href="homepage.html">HP制作</a>
    <a href="line.html">公式LINE</a>
    <a href="index.html#contact">無料相談はこちら</a>
  </nav>
</header>

<main>
  <section class="section image-section page-visual-section">
    <div class="container image-title-wrap">
      <p class="page-mini-title">ホームページのご案内</p>

      <picture class="responsive-picture">
        <source media="(max-width: 760px)" srcset="images/sumafo/sumafo.hp.png">
        <img src="images/pc.png/hp.png" alt="美容サロン専用ホームページ制作" class="page-visual-image wide-visual">
      </picture>
    </div>
  </section>

  <section class="section section-soft page-intro-section">
    <div class="container two-column page-intro-column">
      <div class="page-intro-text">
        <span class="badge-pill">サロンの魅力をもっと伝える</span>

        <h1 class="big-title page-main-title">
          <span class="accent">美容サロン専用</span><br>
          ホームページ制作
        </h1>

        <p class="lead">
          おしゃれなデザインと分かりやすい導線で、<br class="sp-only">
          「気になる」から「予約」へつなげます。
        </p>
      </div>

      <div class="price-badge">
        <small>期間限定キャンペーン</small>
        <strong>79,800円</strong>
        <div class="badge-white-box">
          HP制作をご依頼の方は<br>
          +10,000円で予約フォーム作成可能
        </div>
        <p class="badge-sub top-gap-small"></p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container back-link-wrap">
      <a href="index.html" class="back-link">TOPへ戻る</a>
    </div>
  </section>
</main>

<script src="script.js"></script>
